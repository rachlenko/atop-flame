name: release

# Triggered on semver tag push (vX.Y.Z, optionally followed by a -prerelease
# suffix like -rc1). Can also be triggered manually for a dry-run build that
# produces artifacts but does NOT create a GitHub Release or push to ghcr.io.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build for (e.g. v0.0.2) — artifacts only, no release'
        required: true
        default: 'v0.0.0'

permissions:
  contents: read

env:
  APP: atop-flame
  GO_VERSION: '1.21'

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Parse and validate the version once, expose it to downstream jobs.
  # ────────────────────────────────────────────────────────────────────────────
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}   # e.g. v0.0.2
      semver:  ${{ steps.v.outputs.semver }}    # e.g. 0.0.2
    steps:
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Version '$version' is not a valid semver tag (vX.Y.Z[-pre])"
            exit 1
          fi
          echo "version=$version"      >> "$GITHUB_OUTPUT"
          echo "semver=${version#v}"   >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  # Cross-compile static binaries for macOS and Linux, both amd64 and arm64.
  # Each binary is uploaded as its own workflow artifact with a versioned name.
  # ────────────────────────────────────────────────────────────────────────────
  build-binaries:
    needs: resolve-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build ${{ env.APP }}-${{ needs.resolve-version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.resolve-version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          out="dist/${APP}-${VERSION}-${GOOS}-${GOARCH}"
          go build -mod=vendor -trimpath \
            -ldflags "-X main.appVersion=${VERSION} -s -w" \
            -o "$out" .
          sha256sum "$out" | tee "${out}.sha256"
          file "$out"
          ls -la "$out"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP }}-${{ needs.resolve-version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ env.APP }}-${{ needs.resolve-version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/${{ env.APP }}-${{ needs.resolve-version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          if-no-files-found: error
          retention-days: 90

  # ────────────────────────────────────────────────────────────────────────────
  # Multi-arch container image to GitHub Container Registry.
  # Skipped on workflow_dispatch to avoid polluting the registry on dry-runs.
  # ────────────────────────────────────────────────────────────────────────────
  docker:
    if: github.event_name == 'push'
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: img
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            REVISION=${{ needs.resolve-version.outputs.version }}
          tags: |
            ${{ steps.img.outputs.name }}:${{ needs.resolve-version.outputs.version }}
            ${{ steps.img.outputs.name }}:${{ needs.resolve-version.outputs.semver }}
            ${{ steps.img.outputs.name }}:latest

  # ────────────────────────────────────────────────────────────────────────────
  # Create a GitHub Release and attach every built binary + checksum.
  # Skipped on workflow_dispatch (no tag to release against).
  # ────────────────────────────────────────────────────────────────────────────
  release:
    if: github.event_name == 'push'
    needs: [resolve-version, build-binaries, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List collected files
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.version }}
          name: ${{ needs.resolve-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
